<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Digital Diary Reset Password — Verify security questions and update your account password." />
  <title>Reset Password — Digital Diary</title>
  
  <!-- Pre-render Session Guard: Redirect to dashboard if already logged in -->
  <script>
    (function() {
      if (localStorage.getItem('currentUser')) {
        window.location.replace('dashboard.html');
      }
    })();
  </script>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo" aria-hidden="true">📖</div>
      <h1 class="auth-title">Reset Password</h1>
      
      <!-- Wizard Progress Indicators (Optional but premium) -->
      <p id="forgot-wizard-desc" class="auth-subtitle">
        Enter your registered mobile number to locate your account.
      </p>

      <!-- STEP 1: Enter Mobile Number -->
      <div id="step-1" class="step-container active">
        <form id="form-step-1" novalidate>
          <div class="form-group">
            <label class="form-label" for="reset-mobile">Mobile Number</label>
            <input type="tel" id="reset-mobile" class="form-input"
                   placeholder="e.g. 9876543210"
                   maxlength="10" required />
          </div>
          <button type="submit" id="btn-step-1" class="btn btn-primary btn-lg btn-full btn-round" style="margin-top: var(--space-4)">
            Find Account 🔍
          </button>
        </form>
      </div>

      <!-- STEP 2: Answer Security Question -->
      <div id="step-2" class="step-container">
        <div class="form-group">
          <label class="form-label">Security Question</label>
          <div id="question-display" class="forgot-question-text">
            Loading security question...
          </div>
        </div>

        <form id="form-step-2" novalidate>
          <div class="form-group">
            <label class="form-label" for="reset-answer">Your Answer</label>
            <input type="text" id="reset-answer" class="form-input"
                   placeholder="Type your security answer"
                   maxlength="100" autocomplete="off" required />
          </div>
          <button type="submit" id="btn-step-2" class="btn btn-primary btn-lg btn-full btn-round" style="margin-top: var(--space-4)">
            Verify Answer Check ✔️
          </button>
        </form>
      </div>

      <!-- STEP 3: Enter New Password -->
      <div id="step-3" class="step-container">
        <form id="form-step-3" novalidate>
          <!-- New Password -->
          <div class="form-group">
            <label class="form-label" for="reset-password">New Password</label>
            <div class="password-input-container">
              <input type="password" id="reset-password" class="form-input"
                     placeholder="At least 6 characters"
                     maxlength="40" autocomplete="new-password" required />
              <button type="button" class="password-toggle-btn" title="Show password" aria-label="Show password">👁️‍🗨️</button>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label class="form-label" for="reset-confirm-password">Confirm New Password</label>
            <div class="password-input-container">
              <input type="password" id="reset-confirm-password" class="form-input"
                     placeholder="Confirm new password"
                     maxlength="40" autocomplete="new-password" required />
              <button type="button" class="password-toggle-btn" title="Show password" aria-label="Show password">👁️‍🗨️</button>
            </div>
          </div>

          <button type="submit" id="btn-step-3" class="btn btn-primary btn-lg btn-full btn-round" style="margin-top: var(--space-4)">
            Reset & Save Password 💾
          </button>
        </form>
      </div>

      <div class="auth-divider"></div>

      <!-- Footer navigation -->
      <div class="auth-footer-links">
        Remember your password? <a href="index.html">Back to Login</a>
      </div>

      <div style="text-align: center; margin-top: var(--space-6); font-size: 0.75rem; color: var(--text-light)">
        🔒 All data stored locally in your browser &bull; No servers
      </div>
    </div>

    <!-- Site Footer -->
    <footer class="site-footer" role="contentinfo">
      <div class="site-footer-content">
        © 2026 Digital Diary &bull; Developed by <a href="https://knitinnn.github.io/portfolio/" target="_blank" rel="noopener noreferrer" class="site-footer-link" aria-label="Nitin's Portfolio Website">Nitin.dev</a>
      </div>
    </footer>
  </div>

  <div class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/forgot-password.js"></script>
</body>
</html>
