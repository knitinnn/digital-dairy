<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Digital Diary Sign Up — Create your account and begin your private journal journey." />
  <title>Sign Up — Digital Diary</title>
  
  <!-- Pre-render Session Guard: Redirect to dashboard if already logged in -->
  <script>
    (function() {
      if (localStorage.getItem('currentUser')) {
        window.location.replace('dashboard.html');
      }
    })();
  </script>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-page" style="padding: var(--space-8) var(--space-4)">
    <div class="auth-card" style="max-width: 520px;">
      <div class="auth-logo" aria-hidden="true">📖</div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">
        Join Digital Diary and start capturing your thoughts safely.
      </p>

      <form id="signup-form" novalidate>
        <!-- Full Name -->
        <div class="form-group">
          <label class="form-label" for="signup-name">Full Name</label>
          <input type="text" id="signup-name" class="form-input"
                 placeholder="e.g. Nitin Kumar"
                 maxlength="50" autocomplete="name" required />
        </div>

        <!-- Mobile Number -->
        <div class="form-group">
          <label class="form-label" for="signup-mobile">Mobile Number</label>
          <input type="tel" id="signup-mobile" class="form-input"
                 placeholder="e.g. 9876543210"
                 maxlength="10" autocomplete="tel" required />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="signup-password">Password</label>
          <div class="password-input-container">
            <input type="password" id="signup-password" class="form-input"
                   placeholder="At least 6 characters"
                   maxlength="40" autocomplete="new-password" required />
            <button type="button" class="password-toggle-btn" title="Show password" aria-label="Show password">👁️‍🗨️</button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label class="form-label" for="signup-confirm-password">Confirm Password</label>
          <div class="password-input-container">
            <input type="password" id="signup-confirm-password" class="form-input"
                   placeholder="Re-enter your password"
                   maxlength="40" autocomplete="new-password" required />
            <button type="button" class="password-toggle-btn" title="Show password" aria-label="Show password">👁️‍🗨️</button>
          </div>
        </div>

        <!-- Security Question Dropdown -->
        <div class="form-group">
          <label class="form-label" for="signup-question">Security Question</label>
          <select id="signup-question" class="form-select" required>
            <option value="" disabled selected>Select a security question</option>
            <option value="What is your favorite hero name?">What is your favorite hero name?</option>
            <option value="What is your favorite heroine name?">What is your favorite heroine name?</option>
            <option value="What is your favorite person's name?">What is your favorite person's name?</option>
            <option value="What is your favorite color?">What is your favorite color?</option>
            <option value="What is your favorite movie?">What is your favorite movie?</option>
            <option value="What is your favorite place?">What is your favorite place?</option>
            <option value="What is your childhood nickname?">What is your childhood nickname?</option>
            <option value="What is your dream company?">What is your dream company?</option>
          </select>
        </div>

        <!-- Security Answer -->
        <div class="form-group">
          <label class="form-label" for="signup-answer">Security Answer</label>
          <input type="text" id="signup-answer" class="form-input"
                 placeholder="Answer the question above"
                 maxlength="100" autocomplete="off" required />
        </div>

        <!-- Submit Button -->
        <button type="submit" id="signup-submit-btn" class="btn btn-primary btn-lg btn-full btn-round" style="margin-top: var(--space-4)">
          Register & Log In 🚀
        </button>
      </form>

      <div class="auth-divider"></div>

      <!-- Footer navigation -->
      <div class="auth-footer-links">
        Already have an account? <a href="index.html">Login</a>
      </div>

      <div style="text-align: center; margin-top: var(--space-6); font-size: 0.75rem; color: var(--text-light)">
        🔒 All data stored locally in your browser &bull; No servers
      </div>
    </div>

    <!-- Site Footer -->
    <footer class="site-footer" role="contentinfo">
      <div class="site-footer-content">
        © 2026 Digital Diary &bull; Developed by <a href="https://knitinnn.github.io/portfolio/" target="_blank" rel="noopener noreferrer" class="site-footer-link" aria-label="Nitin's Portfolio Website">Nitin.dev</a>
      </div>
    </footer>
  </div>

  <div class="toast-container"></div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
